steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "-t"
      - "${_IMAGE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_IMAGE_NAME}:latest"
      - "./backend"

  # ── Step 2: Push to Artifact Registry ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    waitFor: ["build"]
    args:
      - "push"
      - "--all-tags"
      - "${_IMAGE_NAME}"

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    waitFor: ["push"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_IMAGE_NAME}:${SHORT_SHA}"
      - "--platform=managed"
      - "--region=${_REGION}"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--set-env-vars=WEATHER_API_KEY=${_WEATHER_API_KEY},FIRESTORE_PROJECT_ID=${_FIRESTORE_PROJECT_ID},DEFAULT_CITY=${_DEFAULT_CITY},FRONTEND_ORIGIN=${_FRONTEND_ORIGIN}"
      - "--set-secrets=GOOGLE_APPLICATION_CREDENTIALS=stayheal-service-account:latest"

# ── Substitution defaults (override via trigger or --substitutions flag) ───────
substitutions:
  _SERVICE_NAME:        "stayheal-api"
  _REGION:              "asia-south1"        # Mumbai  — closest to Bengaluru
  _IMAGE_NAME:          "asia-south1-docker.pkg.dev/${PROJECT_ID}/stayheal/backend"
  _WEATHER_API_KEY:     ""                   # override in Cloud Build trigger
  _FIRESTORE_PROJECT_ID: "${PROJECT_ID}"
  _DEFAULT_CITY:        "Bengaluru"
  _FRONTEND_ORIGIN:     "https://your-frontend-domain.com"

images:
  - "${_IMAGE_NAME}:${SHORT_SHA}"
  - "${_IMAGE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
